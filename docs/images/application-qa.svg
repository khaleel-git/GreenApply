<svg xmlns="http://www.w3.org/2000/svg" width="360" height="580" viewBox="0 0 360 580">
  <rect width="360" height="580" fill="#e5e7eb"/>
  <rect x="22" y="22" width="320" height="538" rx="12" fill="rgba(0,0,0,0.08)"/>
  <rect x="20" y="20" width="320" height="538" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1"/>

  <!-- header -->
  <rect x="20" y="20" width="320" height="44" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="20" y="52" width="320" height="14" fill="white"/>
  <circle cx="38" cy="42" r="7" fill="#16a34a"/>
  <text x="52" y="47" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#111827">GreenApply</text>
  <text x="330" y="47" font-family="sans-serif" font-size="12" fill="#9ca3af" text-anchor="end">▼</text>

  <!-- section header row -->
  <text x="34" y="86" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#111827">Application Questions</text>
  <text x="316" y="86" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#6b7280" text-anchor="end">3 / 5 filled</text>

  <!-- ── Q1: Why excited (AI) ──────────────────────────────── -->
  <rect x="34" y="96" width="288" height="100" rx="8" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <!-- question text -->
  <text x="44" y="113" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="600" fill="#374151">Why do you find this job exciting?</text>
  <text x="44" y="113" font-family="sans-serif" font-size="10" fill="#dc2626" dx="184">*</text>
  <!-- AI badge -->
  <rect x="264" y="100" width="48" height="18" rx="9" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="288" y="113" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" font-weight="700" fill="#7c3aed" text-anchor="middle">AI</text>
  <!-- answer text area -->
  <rect x="44" y="120" width="264" height="48" rx="6" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="52" y="134" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#111827">Axel Springer's intersection of media and AI is</text>
  <text x="52" y="147" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#111827">exactly where I want to build. My NLP pipeline</text>
  <text x="52" y="160" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#111827">work maps directly to your automation goals…</text>
  <!-- footer row -->
  <text x="44" y="186" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#9ca3af">312 / 1440</text>
  <rect x="268" y="176" width="46" height="20" rx="6" fill="#16a34a"/>
  <text x="291" y="190" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle">✓ Filled</text>

  <!-- ── Q2: Enrolled (Profile) ────────────────────────────── -->
  <rect x="34" y="204" width="288" height="66" rx="8" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <text x="44" y="221" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="600" fill="#374151">Are you enrolled for the duration?</text>
  <text x="44" y="221" font-family="sans-serif" font-size="10" fill="#dc2626" dx="185">*</text>
  <rect x="242" y="208" width="70" height="18" rx="9" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="277" y="221" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" font-weight="700" fill="#0369a1" text-anchor="middle">Profile</text>
  <!-- select -->
  <rect x="44" y="228" width="200" height="26" rx="6" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="52" y="245" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#111827">Yes</text>
  <text x="238" y="245" font-family="sans-serif" font-size="10" fill="#6b7280" text-anchor="end">▼</text>
  <rect x="268" y="232" width="46" height="20" rx="6" fill="#16a34a"/>
  <text x="291" y="246" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle">✓ Filled</text>

  <!-- ── Q3: Work permit (Profile) ─────────────────────────── -->
  <rect x="34" y="278" width="288" height="66" rx="8" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <text x="44" y="295" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="600" fill="#374151">Do you have a valid work permit?</text>
  <rect x="240" y="282" width="70" height="18" rx="9" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="275" y="295" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" font-weight="700" fill="#0369a1" text-anchor="middle">Profile</text>
  <rect x="44" y="302" width="200" height="26" rx="6" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="52" y="319" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#111827">Yes — Student Visa</text>
  <text x="238" y="319" font-family="sans-serif" font-size="10" fill="#6b7280" text-anchor="end">▼</text>
  <rect x="268" y="306" width="46" height="20" rx="6" fill="#16a34a"/>
  <text x="291" y="320" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle">✓ Filled</text>

  <!-- ── Q4: Availability (Default) ───────────────────────── -->
  <rect x="34" y="352" width="288" height="66" rx="8" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <text x="44" y="369" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="600" fill="#374151">When are you available?</text>
  <text x="44" y="369" font-family="sans-serif" font-size="10" fill="#dc2626" dx="130">*</text>
  <rect x="256" y="356" width="56" height="18" rx="9" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="284" y="369" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" font-weight="700" fill="#92400e" text-anchor="middle">Default</text>
  <rect x="44" y="376" width="220" height="26" rx="6" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="52" y="393" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#111827">From July 2026 to July 2027</text>
  <rect x="268" y="380" width="46" height="20" rx="6" fill="#374151"/>
  <text x="291" y="394" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle">Fill</text>

  <!-- ── Q5: How did you hear (Default) ───────────────────── -->
  <rect x="34" y="426" width="288" height="66" rx="8" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <text x="44" y="443" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="600" fill="#374151">How did you become aware of this vacancy?</text>
  <rect x="248" y="430" width="64" height="18" rx="9" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="280" y="443" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" font-weight="700" fill="#92400e" text-anchor="middle">Default</text>
  <rect x="44" y="450" width="200" height="26" rx="6" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="52" y="467" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#111827">LinkedIn</text>
  <text x="238" y="467" font-family="sans-serif" font-size="10" fill="#6b7280" text-anchor="end">▼</text>
  <rect x="268" y="454" width="46" height="20" rx="6" fill="#374151"/>
  <text x="291" y="468" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle">Fill</text>

  <!-- Fill All button -->
  <rect x="34" y="504" width="288" height="38" rx="8" fill="#111827"/>
  <text x="178" y="527" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">Fill All (5)</text>

  <!-- note -->
  <text x="178" y="552" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Review each answer before filling. Edit directly in the boxes.</text>
</svg>
