<svg xmlns="http://www.w3.org/2000/svg" width="360" height="520" viewBox="0 0 360 520">
  <rect width="360" height="520" fill="#e5e7eb"/>
  <rect x="22" y="22" width="320" height="478" rx="12" fill="rgba(0,0,0,0.08)"/>
  <rect x="20" y="20" width="320" height="478" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1"/>

  <!-- header -->
  <rect x="20" y="20" width="320" height="44" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="20" y="52" width="320" height="14" fill="white"/>
  <circle cx="38" cy="42" r="7" fill="#16a34a"/>
  <text x="52" y="47" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#111827">GreenApply</text>

  <!-- generate button (closed state) -->
  <rect x="34" y="76" width="288" height="40" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="52" y="100" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="white">✉  Generate Cover Letter</text>
  <text x="310" y="100" font-family="sans-serif" font-size="12" fill="#9ca3af" text-anchor="end">▼</text>

  <!-- divider -->
  <line x1="34" y1="128" x2="326" y2="128" stroke="#f3f4f6" stroke-width="1"/>

  <!-- generated letter panel -->
  <rect x="34" y="136" width="288" height="330" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>

  <!-- streaming cursor indicator -->
  <rect x="46" y="148" width="264" height="2" rx="1" fill="#16a34a" opacity="0.3"/>

  <!-- letter text lines -->
  <text x="46" y="170" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#111827">Dear Hiring Team at Axel Springer,</text>

  <text x="46" y="192" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#374151">Having followed Axel Springer's push into AI-driven</text>
  <text x="46" y="207" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#374151">newsroom automation, the Werkstudent AI / Automation</text>
  <text x="46" y="222" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#374151">HR role stood out as a direct match for my work at the</text>
  <text x="46" y="237" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#374151">intersection of ML and process automation.</text>

  <text x="46" y="259" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#374151">Over the past 2.5 years I have built production Python</text>
  <text x="46" y="274" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#374151">pipelines for NLP-based candidate screening and designed</text>
  <text x="46" y="289" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#374151">dashboards in Tableau that cut recruiter review time by</text>
  <text x="46" y="304" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#374151">40%. My coursework in Computer Science at TU Berlin</text>
  <text x="46" y="319" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#374151">included applied ML and knowledge graph engineering —</text>
  <text x="46" y="334" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#374151">both directly relevant to your automation roadmap.</text>

  <text x="46" y="356" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#374151">I am enrolled until September 2026 and available to</text>
  <text x="46" y="371" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#374151">start immediately for 20 hrs/week.</text>

  <text x="46" y="393" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#374151">Best regards,</text>
  <text x="46" y="408" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="600" fill="#111827">Khaleel Ahmad</text>

  <!-- blinking cursor -->
  <rect x="46" y="420" width="7" height="12" rx="1" fill="#16a34a">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- copy button -->
  <rect x="34" y="476" width="288" height="36" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="178" y="498" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#374151" text-anchor="middle">📋  Copy to Clipboard</text>
</svg>
