<svg xmlns="http://www.w3.org/2000/svg" width="360" height="240" viewBox="0 0 360 240">
  <rect width="360" height="240" fill="#e5e7eb"/>
  <rect x="22" y="22" width="320" height="198" rx="12" fill="rgba(0,0,0,0.08)"/>
  <rect x="20" y="20" width="320" height="198" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1"/>

  <!-- header -->
  <rect x="20" y="20" width="320" height="44" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="20" y="52" width="320" height="14" fill="white"/>
  <circle cx="38" cy="42" r="7" fill="#16a34a"/>
  <text x="52" y="47" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#111827">GreenApply — Language Check</text>

  <!-- section label -->
  <text x="34" y="86" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#374151">Language Status</text>

  <!-- German row – not met -->
  <rect x="34" y="96" width="288" height="38" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="44" y="120" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#374151">🇩🇪  German</text>
  <rect x="116" y="103" width="62" height="18" rx="9" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="147" y="116" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" font-weight="700" fill="#166534" text-anchor="middle">REQUIRED</text>
  <text x="314" y="120" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#dc2626" text-anchor="end">B1 / B2  ✗</text>

  <!-- English row – met -->
  <rect x="34" y="140" width="288" height="38" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="44" y="164" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#374151">🇬🇧  English</text>
  <rect x="118" y="147" width="62" height="18" rx="9" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="149" y="160" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="9" font-weight="700" fill="#166534" text-anchor="middle">REQUIRED</text>
  <text x="314" y="164" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#16a34a" text-anchor="end">C1 / B2  ✓</text>

  <!-- tip -->
  <text x="34" y="204" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#9ca3af">Your level / required level  ·  detected via regex + JSON-LD</text>
</svg>
